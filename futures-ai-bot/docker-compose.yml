version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: infra/Dockerfile.api
    env_file:
      - .env
    volumes:
      - ./:/app
    ports:
      - "8000:8000"
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]

  dashboard:
    build:
      context: .
      dockerfile: infra/Dockerfile.dashboard
    env_file:
      - .env
    volumes:
      - ./:/app
    ports:
      - "8501:8501"
    command: ["streamlit", "run", "apps/dashboard/app.py", "--server.address", "0.0.0.0", "--server.port", "8501"]
